services:
  pecaqui-site:
    build:
      context: .
      args:
        VITE_SITE_URL: ${VITE_SITE_URL:-https://pecaquiautopecas.com.br}
    container_name: pecaqui-site
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_SITE_URL: ${VITE_SITE_URL:-https://pecaquiautopecas.com.br}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/public/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: pecaqui-nginx
    restart: unless-stopped
    depends_on:
      pecaqui-site:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
